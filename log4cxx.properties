log4j.rootLogger=TRACE, Console

log4j.appender.Console=org.apache.log4j.ConsoleAppender
log4j.appender.Console.layout=org.apache.log4j.PatternLayout
log4j.appender.Console.layout.ConversionPattern=[%d{ISO8601}] [%-5p] [%c{1}] %m%n

# Enable trace logging for plugin-related classes
log4j.logger.graph.PluginLoader=TRACE
log4j.logger.graph.PluginRegistry=TRACE
log4j.logger.graph.NodeFactory=TRACE
log4j.logger.graph.NodeFacadeAdapter=TRACE

# Enable trace for node classes
log4j.logger.FlightMonitorNode=TRACE
log4j.logger.StateVectorCaptureSinkNode=TRACE
log4j.logger.EstimationPipelineNode=TRACE
